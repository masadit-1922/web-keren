<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Surveillance NOC Command Center - Turi Network</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
        }
        /* Custom Popup Tema Cyberpunk AI */
        .leaflet-popup-content-wrapper {
            background: rgba(15, 23, 42, 0.95) !important;
            color: #f8fafc !important;
            border: 1px solid #06b6d4 !important;
            border-radius: 12px !important;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3) !important;
        }
        .leaflet-popup-tip {
            background: #0f172a !important;
            border: 1px solid #06b6d4 !important;
        }
        
        /* Label teks nama langsung di atas jarum (Permanent Tooltip) */
        .custom-tooltip {
            background: rgba(15, 23, 42, 0.85) !important;
            border: 1px solid #06b6d4 !important;
            color: #22d3ee !important;
            font-weight: 600;
            font-size: 11px !important;
            border-radius: 4px !important;
            padding: 2px 6px !important;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .leaflet-tooltip-top:before {
            border-top-color: #06b6d4 !important;
        }

        /* Animasi Text Log AI Berjalan */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .ai-scanner::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background: #06b6d4;
            box-shadow: 0 0 10px #06b6d4;
            animation: scanline 3s linear infinite;
            top: 0;
            left: 0;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body class="h-screen overflow-hidden text-slate-200 flex flex-col selection:bg-cyan-500/30">

    <header class="bg-slate-950/80 border-b border-cyan-500/20 px-6 py-4 flex items-center justify-between z-50 shadow-[0_4px_20px_rgba(6,182,212,0.05)] backdrop-blur-md">
        <div class="flex items-center space-x-4">
            <div class="relative flex h-3.5 w-3.5">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3.5 w-3.5 bg-cyan-500"></span>
            </div>
            <div>
                <h1 class="text-md font-bold tracking-widest text-white">TURI NETWORK <span class="text-cyan-400 font-light font-mono">[AI CORE V.26]</span></h1>
                <p class="text-[11px] text-slate-400 font-mono">NEURAL LIVE SURVEILLANCE ENGINE</p>
            </div>
        </div>
        <div class="text-right font-mono text-xs hidden sm:block">
            <div class="text-cyan-400 font-semibold tracking-wider" id="liveClock">CLOCK_SYNCING...</div>
            <div class="text-[10px] text-slate-500 mt-0.5">MATRIX STATUS: <span class="text-emerald-400 font-bold">READY</span></div>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden relative">
        
        <aside class="w-85 bg-slate-950/90 border-r border-slate-800 p-4 flex flex-col space-y-5 overflow-y-auto z-40 backdrop-blur-sm">
            
            <div class="bg-slate-900/60 p-3 rounded-xl border border-cyan-500/10 relative overflow-hidden ai-scanner h-44 flex flex-col">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-[10px] font-bold text-cyan-400 uppercase tracking-widest font-mono">Neural Object Detection Log</h2>
                    <span class="inline-flex items-center px-1.5 py-0.5 rounded-full text-[9px] font-medium bg-cyan-400/10 text-cyan-400 animate-pulse border border-cyan-400/20">AI ACTIVE</span>
                </div>
                <div id="aiLogs" class="text-[11px] font-mono text-slate-400 space-y-1.5 overflow-y-auto flex-1 pr-1">
                    </div>
            </div>

            <div class="flex-1 flex flex-col min-h-0">
                <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 font-mono">System Camera Feeds</h2>
                <div class="space-y-2 overflow-y-auto pr-1 flex-1" id="cameraList">
                    </div>
            </div>

            <div class="bg-slate-900/40 p-3 rounded-lg border border-slate-800 text-[11px] space-y-2 font-mono">
                <div class="flex justify-between"><span>Neural Core Processing:</span><span class="text-cyan-400 font-bold" id="cpuLoad">32%</span></div>
                <div class="w-full bg-slate-800 h-1 rounded-full overflow-hidden"><div class="bg-cyan-400 h-full transition-all duration-500" id="cpuBar" style="width: 32%"></div></div>
            </div>

        </aside>

        <main class="flex-1 h-full w-full relative bg-slate-900">
            <div class="absolute inset-0 pointer-events-none z-30 flex items-center justify-center opacity-10">
                <div class="w-64 h-64 border border-cyan-400 rounded-full flex items-center justify-center animate-spin [animation-duration:20s]">
                    <div class="w-48 h-48 border border-dashed border-cyan-400 rounded-full"></div>
                </div>
                <div class="absolute w-6 h-0.5 bg-cyan-400"></div>
                <div class="absolute h-6 w-0.5 bg-cyan-400"></div>
            </div>

            <div id="map" class="h-full w-full"></div>
        </main>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Setup Base Map Layers (Satelit & Neon Dark Mode)
        const neonDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '©CartoDB'
        });

        const googleSatellite = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            attribution: '©Google Satellite'
        });

        // 2. Inisialisasi Peta (Default pake Satelit biar mantap)
        const map = L.map('map', { 
            zoomControl: false,
            layers: [googleSatellite] // Peta satelit jadi default awal luar layar
        }).setView([-7.6877, 110.3421], 15);
        
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // 3. Controller Pilihan Peta (Satelit vs Dark Mode) - POJOK KANAN ATAS
        const baseMaps = {
            "🛰️ Peta Satelit": googleSatellite,
            "🌌 Mode Cyberpunk": neonDark
        };
        L.control.layers(baseMaps, null, { position: 'topright' }).addTo(map);

        // 4. Data Titik CCTV Lo
        const dataCCTV = [
            {
                id: 1,
                nama: "CCTV - Simpang Turi Pos 1",
                wilayah: "Turi Kidul",
                lat: -7.6895, 
                lng: 110.3410,
                ip: "192.168.10.21",
                videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4" 
            },
            {
                id: 2,
                nama: "CCTV - Area Gudang Utama",
                wilayah: "Kawasan Industri",
                lat: -7.6850, 
                lng: 110.3450,
                ip: "192.168.10.22",
                videoUrl: "https://www.w3schools.com/html/movie.mp4"
            }
        ];

        const cameraListContainer = document.getElementById('cameraList');

        // 5. Plotting Marker + Tooltip Nama Permanen di Atas Jarum
        dataCCTV.forEach(function(cctv) {
            const marker = L.marker([cctv.lat, cctv.lng]).addTo(map);
            
            // Pasang Teks Nama Permanen di atas Jarum (Tooltip)
            marker.bindTooltip(`${cctv.nama} [${cctv.wilayah}]`, {
                permanent: true,
                direction: 'top',
                className: 'custom-tooltip',
                offset: [0, -10]
            });
            
            // Desain Popup Live Video pas Jarum diklik
            const popupContent = `
                <div class="cctv-popup w-[280px] font-mono">
                    <h3 class="text-xs font-bold text-cyan-400 uppercase tracking-wide mb-1">${cctv.nama}</h3>
                    <p class="text-[9px] text-slate-400 mb-2">LOC: ${cctv.lat.toFixed(4)}, ${cctv.lng.toFixed(4)} | IP: ${cctv.ip}</p>
                    <video class="w-full rounded-lg border border-slate-700 shadow-lg" controls autoplay muted loop playsinline>
                        <source src="${cctv.videoUrl}" type="video/mp4">
                    </video>
                </div>
            `;
            marker.bindPopup(popupContent, { maxWidth: 350 });

            // Render Item List di Sidebar Kiri
            const listItem = document.createElement('div');
            listItem.className = "bg-slate-900/80 p-3 rounded-xl border border-slate-800/80 hover:border-cyan-400/50 transition duration-300 cursor-pointer flex items-center justify-between group";
            listItem.innerHTML = `
                <div class="font-mono">
                    <h4 class="text-xs font-semibold text-slate-300 group-hover:text-cyan-400 transition">${cctv.nama}</h4>
                    <p class="text-[10px] text-slate-500 mt-0.5">NET_IP // ${cctv.ip}</p>
                </div>
                <div class="h-2 w-2 rounded-full bg-cyan-400 shadow-[0_0_8px_#06b6d4]"></div>
            `;
            
            // Efek klik list -> auto fokus peta & buka video
            listItem.addEventListener('click', function() {
                map.setView([cctv.lat, cctv.lng], 17);
                marker.openPopup();
            });

            cameraListContainer.appendChild(listItem);
        });

        // 6. GIMMICK SCRIPT AI: Bikin Teks Log Deteksi AI Berjalan Otomatis
        const aiLogsContainer = document.getElementById('aiLogs');
        const objects = ["Car", "Motorcycle", "Pedestrian", "Truck", "Bicycle"];
        
        function generateAiLog() {
            const time = new Date().toLocaleTimeString('id-ID', { hour12: false });
            const randomCam = dataCCTV[Math.floor(Math.random() * dataCCTV.length)].nama;
            const randomObj = objects[Math.floor(Math.random() * objects.length)];
            const randomCount = Math.floor(Math.random() * 4) + 1;
            
            const logText = document.createElement('p');
            logText.className = "text-slate-400 leading-relaxed border-l border-cyan-500/30 pl-1.5 animate-fadeIn";
            logText.innerHTML = `[${time}] <span class="text-cyan-400">ANALYTICS:</span> Detected ${randomCount} ${randomObj}(s) at <span class="text-white">${randomCam}</span>`;
            
            aiLogsContainer.insertBefore(logText, aiLogsContainer.firstChild);
            
            if (aiLogsContainer.children.length > 15) {
                aiLogsContainer.removeChild(aiLogsContainer.lastChild);
            }

            // Iseng acak load CPU biar grafik naek turun ala AI beneran
            const randomCpu = Math.floor(Math.random() * 25) + 15;
            document.getElementById('cpuLoad').innerText = `${randomCpu}%`;
            document.getElementById('cpuBar').style.width = `${randomCpu}%`;
        }
        setInterval(generateAiLog, 2500);

        // 7. Live NOC Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').innerText = `NOC_TIME: ${now.toLocaleTimeString('id-ID')} WIB`;
        }
        setInterval(updateClock, 1000);
        updateClock();

    </script>
</body>
</html>
